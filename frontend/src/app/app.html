<nav class="navbar">
  <h1 routerLink="/">🚀 ABC-ODE </h1>
  
  <div class="user-stats">
    <!-- Show when logged in -->
    <ng-container *ngIf="isLoggedIn">
      <div class="hero-info" [routerLink]="['/profile', currentUserId]" *ngIf="currentUserId" style="cursor: pointer;">
        <span class="greeting">👋 Hi,</span>
        <span class="name">{{ heroName }}</span>
      </div>

      <!-- Admin Link - Only shows for admin users -->
      <button *ngIf="isAdmin" class="admin-nav-btn" routerLink="/admin">
        🛸 ADMIN DASHBOARD
      </button>

      <button class="logout-link" (click)="logout()">
        <span class="logout-icon">🚪</span>
        <span class="logout-text">LOG OUT</span>
      </button>
    </ng-container>

    <!-- Show when NOT logged in -->
    <ng-container *ngIf="!isLoggedIn">
      <button class="login-link" routerLink="/login">
        <span class="login-icon">🚀</span>
        <span class="login-text">LOGIN / REGISTER</span>
      </button>
    </ng-container>
  </div>
</nav>

<router-outlet></router-outlet>
